<style>
  :root{
    --parchment:#F3EDE2;--card:#FBF8F2;--ink:#26231D;--soft:#6B6457;
    --copper:#B5532B;--copper-d:#984321;--emerald:#3B7A4E;--brick:#AE382D;
    --amber:#C98A2B;--line:#E2D8C8;--muted:#EDE6D8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--parchment);color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:"Bricolage Grotesque",system-ui,sans-serif;margin:0}
  .wrap{max-width:1040px;margin:0 auto;padding:22px 20px 70px}
  .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .logo{width:42px;height:42px;flex:none}
  .top h1{font-size:25px;letter-spacing:-.01em}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft)}
  .userbar{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--soft)}
  .nav{display:flex;margin:18px 0 14px;border-bottom:1px solid var(--line)}
  .nav button{background:none;border:0;padding:9px 0;margin-right:22px;font:inherit;font-weight:600;color:var(--soft);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .nav button.active{color:var(--ink);border-color:var(--copper)}
  .btn{display:inline-flex;align-items:center;gap:6px;background:var(--copper);color:#fff;border:0;border-radius:9px;padding:9px 15px;font:inherit;font-weight:600;cursor:pointer}
  .btn:hover{background:var(--copper-d)} .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:transparent;color:var(--soft);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--muted);color:var(--ink)}
  .btn.sm{padding:5px 10px;font-size:13px;border-radius:7px}
  .btn.danger{background:transparent;color:var(--brick);border:1px solid #E6C4be}
  .btn.danger:hover{background:#FBEEEC}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px}
  label{display:block;font-size:12px;font-weight:600;color:var(--soft);margin:0 0 4px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field{margin-bottom:12px}
  .note{font-size:12px;color:var(--soft)}
  .err{color:var(--brick);font-size:13px;margin-top:6px}
  .ok{color:var(--emerald);font-size:13px;margin-top:6px}
  .spin,.empty{color:var(--soft);text-align:center;padding:34px 10px}
  .summary-h{font-size:14px;color:var(--soft);margin:2px 0 12px}
  .summary-h b{color:var(--ink)} .summary-h .bad{color:var(--brick);font-weight:700}
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .seg-ctl{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .seg-ctl button{border:0;background:transparent;padding:6px 13px;font:inherit;font-size:13px;color:var(--soft);cursor:pointer}
  .seg-ctl button.on{background:var(--muted);color:var(--ink);font-weight:600}
  .lang-ctl button{padding:5px 10px;font-size:12px;font-weight:700}
  .toolbar .search{flex:1;max-width:240px;margin-left:auto;padding:7px 11px;font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .card2{text-align:left;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:14px;padding:15px 17px;cursor:pointer;font:inherit;color:inherit;transition:border-color .12s,box-shadow .12s;width:100%}
  .card2:hover{border-color:var(--copper);box-shadow:0 3px 12px rgba(38,35,29,.07)}

  .card2.lv-ok{border-left-color:var(--emerald)} .card2.lv-none{border-left-color:var(--line)}
  .c-top{display:flex;align-items:flex-start;gap:8px;justify-content:space-between}
  .c-name{font-family:"Bricolage Grotesque";font-weight:700;font-size:16px}
  .c-acct{font-size:12px;color:var(--soft);margin-top:2px}
  .st{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex:none}
  .st.att{background:#FBEEEC;color:var(--brick)} .st.hoy{background:#FBF1DF;color:var(--amber)}
  .st.ok{background:#EAF3EC;color:var(--emerald)} .st.none{background:var(--muted);color:var(--soft)}
  .strip{display:flex;gap:5px;margin:13px 0 11px}
  .seg{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#fff;border:1px solid var(--line);color:var(--soft)}
  .seg.ok{background:var(--emerald);color:#fff;border-color:var(--emerald)}
  .seg.no{background:var(--brick);color:#fff;border-color:var(--brick)}
  .seg.cur{background:#FBF1DF;color:var(--amber);border-color:#EAD7AE}
  .seg.next{opacity:.45} .seg.part{color:#B9AE9C}
  .c-bot{font-size:13px;color:var(--soft)} .c-bot b{font-family:"Bricolage Grotesque";color:var(--ink);font-size:15px}
  .back{background:none;border:0;color:var(--soft);font:inherit;font-weight:600;cursor:pointer;padding:2px 0;margin-bottom:10px}
  .back:hover{color:var(--ink)}
  .dhead{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .dhead h2{font-size:22px} .dmeta{font-size:13px;color:var(--soft);margin-top:3px}
  .dhead .st{margin-left:auto;align-self:center}
  .weeknav{display:flex;align-items:center;gap:14px;margin:14px 0;font-size:14px;color:var(--soft)}
  .weeknav .rng{font-weight:600;color:var(--ink)}
  .ctitle{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--soft);margin-bottom:12px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);font-weight:600;padding:8px;border-bottom:1px solid var(--line)}
  td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr.off td{opacity:.5}
  .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
  .pill.on{background:#EAF3EC;color:var(--emerald)} .pill.off{background:var(--muted);color:var(--soft)}
  .wsmini{width:auto;padding:4px 8px;font-size:13px;border-radius:7px}
  .loginbox{width:100%;max-width:380px}
  .edit-row input,.edit-row select{padding:5px 8px;font-size:13px;border-radius:7px;width:auto}
  @media(max-width:560px){.grid2,.stats{grid-template-columns:1fr}}

function t(key,vars){
  let s=(I18N[lang]&&I18N[lang][key]!=null)?I18N[lang][key]:(I18N.es[key]||key);
  if(vars)for(const k in vars)s=s.split("{"+k+"}").join(vars[k]);
  return s;
}

const DAYS_ES=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const DAYS_EN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function DAYS(){return lang==="en"?DAYS_EN:DAYS_ES;}

const TZS=[
  ["America/Mexico_City","México","Mexico"],
  ["America/New_York","EUA — Este (Nueva York, Miami)","US — East (New York, Miami)"],
  ["America/Chicago","EUA — Centro (Chicago, Dallas)","US — Central (Chicago, Dallas)"],

  ["Europe/Paris","España / Francia / Europa Central","Spain / France / Central Europe"],
  ["Europe/Helsinki","Grecia / Finlandia / Estonia / Europa del Este","Greece / Finland / Estonia / Eastern Europe"],
  ["Europe/Moscow","Rusia (Moscú)","Russia (Moscow)"],
  ["Africa/Casablanca","Marruecos","Morocco"],
  ["Africa/Johannesburg","Sudáfrica","South Africa"],
  ["Asia/Dubai","Emiratos / Arabia Saudita","UAE / Saudi Arabia"],
  ["Asia/Kolkata","India","India"],
  ["Asia/Bangkok","Tailandia / Vietnam","Thailand / Vietnam"],
  ["Asia/Shanghai","China / Singapur / Filipinas","China / Singapore / Philippines"],
  ["Asia/Tokyo","Japón / Corea del Sur","Japan / South Korea"],
  ["Australia/Sydney","Australia (Este)","Australia (East)"],
  ["Australia/Perth","Australia (Oeste)","Australia (West)"],
  ["Pacific/Auckland","Nueva Zelanda","New Zealand"],
];

function tzLabel(tz){const row=TZS.find(x=>x[0]===tz);if(!row)return tz||"—";return lang==="en"?row[2]:row[1];}
function localDate(ms,tz){return new Date(ms).toLocaleDateString("en-CA",{timeZone:tz||"America/Mexico_City"});}
function todayLocal(tz){return localDate(Date.now(),tz);}
const OFFSET_TZ={"-8":"America/Los_Angeles","-7":"America/Denver","-6":"America/Mexico_City","-5":"America/New_York","-4":"America/Santiago","-3":"America/Argentina/Buenos_Aires","0":"Europe/London","1":"Europe/Paris","2":"Europe/Helsinki"};
function playerTZ(p){return p.timezone||(OFFSET_TZ[String(p.tz_offset)])||"America/Mexico_City";}

const pad=n=>String(n).padStart(2,"0");
const addDays=(s,n)=>{const d=new Date(s+"T00:00:00Z");d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10);};
const dow=s=>new Date(s+"T00:00:00Z").getUTCDay();
const ddmm=s=>{const a=s.split("-");return a[2]+"/"+a[1];};
const weekStartOf=(s,ws)=>{let d=new Date(s+"T00:00:00Z");while(d.getUTCDay()!==ws)d.setUTCDate(d.getUTCDate()-1);return d.toISOString().slice(0,10);};
const isWorking=(s,ws)=>((dow(s)-ws+7)%7)<5;

function wsForPlayer(p,dateStr){
  const sc=state.schedules.filter(x=>x.player_id===p.id&&x.effective_from<=dateStr).sort((a,b)=>a.effective_from<b.effective_from?1:-1);
  return sc.length?sc[0].week_start_day:p.week_start_day;
}
function dayAges(p){
  const tz=playerTZ(p);
  const arr=state.snaps.filter(s=>s.player_id===p.id).map(s=>({t:Date.parse(s.captured_at),age:s.age_seconds})).sort((a,b)=>a.t-b.t);
  const byDate={};
  for(const s of arr)byDate[localDate(s.t,tz)]=s.age;
  return{byDate,dates:Object.keys(byDate).sort()};
}
function endAge(da,s){let r=null;for(const d of da.dates){if(d<=s)r=da.byDate[d];else break;}return r;}
function minutesFor(da,s){const e=endAge(da,s),pv=endAge(da,addDays(s,-1));if(e==null||pv==null)return{min:null,partial:true};return{min:Math.max(0,(e-pv)/60),partial:false};}
function statusFor(p,da,s){
  const tz=playerTZ(p),ws=wsForPlayer(p,s),today=todayLocal(tz),working=isWorking(s,ws);
  if(s>today)return{k:"next",min:null,working};
  const r=minutesFor(da,s);
  if(!working)return{k:"rest",min:r.min,working};
  if(r.partial)return{k:"part",min:null,working};
  if(r.min>=60)return{k:"ok",min:r.min,working};
  if(s===today)return{k:"cur",min:r.min,working};
  return{k:"no",min:r.min,working};
}
function weekData(p,off){
  const tz=playerTZ(p),today=todayLocal(tz);
  const curStart=weekStartOf(today,wsForPlayer(p,today));
  const weekStart=addDays(curStart,off*7);
  const da=dayAges(p);
  const days=[];for(let i=0;i<7;i++){const d=addDays(weekStart,i);days.push({date:d,st:statusFor(p,da,d)});}
  let met=0,missed=0,todayPending=false;
  for(const o of days){if(!o.st.working)continue;
    if(o.date<today){if(o.st.k==="ok")met++;else if(o.st.k==="no")missed++;}
    else if(o.date===today){if(o.st.k==="ok")met++;else if(o.st.k==="no")missed++;else todayPending=true;}
  }
  let level=missed>0?"atencion":(todayPending?"hoy":"aldia");
  if(da.dates.length===0)level="sindatos";
  return{da,weekStart,days,met,missed,todayPending,level};
}
function weeklyTrend(p,n){const a=[];for(let o=-(n-1);o<=0;o++){const w=weekData(p,o);a.push({start:w.weekStart,met:w.met});}return a;}
function currentStreak(p){
  const tz=playerTZ(p),da=dayAges(p),today=todayLocal(tz);let streak=0,d=today;
  for(let i=0;i<70;i++){const ws=wsForPlayer(p,d);
    if(isWorking(d,ws)){const st=statusFor(p,da,d);
      if(st.k==="cur"||st.k==="part"){if(d===today){d=addDays(d,-1);continue;}break;}
      if(st.k==="ok")streak++;else break;}
    d=addDays(d,-1);}
  return streak;
}
function totalHours(p){const s=state.snaps.filter(x=>x.player_id===p.id);if(!s.length)return null;return Math.max(...s.map(x=>x.age_seconds))/3600;}

function reportWeekStartISO(off){
  const ref=weekStartOf(todayLocal("America/Mexico_City"),1);
  return addDays(ref,off*7);
}
function reportWeekLabel(off){
  const ws=reportWeekStartISO(off);
  return ddmm(ws)+" – "+ddmm(addDays(ws,6));
}

async function loadAll(){
  state.loading=true;render();
  const since=new Date(Date.now()-70*864e5).toISOString();
  const[pr,sc,sn]=await Promise.all([
    sb.from("players").select("*").order("friendly_name"),
    sb.from("schedules").select("*"),
    sb.from("snapshots").select("player_id,captured_at,age_seconds").gte("captured_at",since)

async function login(){

async function validateKey(key){
  try{
    const r=await fetch("https://api.guildwars2.com/v2/account?access_token="+encodeURIComponent(key));
    if(r.status===200){const a=await r.json();return{ok:true,name:a.name,age:a.age};}
    if(r.status===401||r.status===403)return{ok:false,error:t("keyInvalid")};
    return{ok:false,error:t("keyCheckErr")};
  }catch(e){return{ok:false,error:t("keyConnErr")}}
}

async function addPlayer(){
  const name=v("f_name").trim(),key=v("f_key").trim(),tz=v("f_tz"),ws=parseInt(v("f_ws"));
  const btn=document.getElementById("addbtn");
  if(!name||!key){setAddMsg(t("fillNameKey"),true);return;}
  btn.disabled=true;setAddMsg(t("validating"),false);
  const val_=await validateKey(key);
  if(!val_.ok){setAddMsg(val_.error,true);btn.disabled=false;return;}
  const masked=key.slice(0,4)+"····"+key.slice(-4);
  const ins=await sb.from("players").insert({
    friendly_name:name,account_name:val_.name,tz_city:tzLabel(tz),
    tz_offset:0,timezone:tz,week_start_day:ws,active:true
  }).select().single();
  if(ins.error){setAddMsg(t("saveErr")+ins.error.message,true);btn.disabled=false;return;}
  const p=ins.data;
  const k=await sb.from("player_keys").insert({player_id:p.id,api_key:key,key_masked:masked});
  if(k.error){setAddMsg(t("keyErr")+k.error.message,true);btn.disabled=false;await loadAll();return;}
  await sb.from("schedules").insert({player_id:p.id,week_start_day:ws,effective_from:todayLocal(tz)});
  btn.disabled=false;
  state.addMsg={text:"✓ "+name+" ("+val_.name+") "+t("addedOk"),err:false};
  await loadAll();
}

function minutesChart(days){
  const W=720,H=215,pL=10,pR=10,pT=24,pB=36,n=days.length;
  const iW=W-pL-pR,iH=H-pT-pB,slot=iW/n,bW=Math.min(48,slot*0.5);
  let mx=90;days.forEach(d=>{if(d.st.min&&d.st.min>mx)mx=d.st.min;});const sMax=Math.ceil(mx/30)*30;
  const y=v=>pT+iH-(v/sMax*iH),gY=y(60);let g="";
  days.forEach((d,i)=>{
    const cx=pL+slot*i+slot/2,m=d.st.min;
    const col=d.st.k==="ok"?"#3B7A4E":d.st.k==="no"?"#AE382D":d.st.k==="cur"?"#C98A2B":(d.st.working?"#D9CDBA":"#EAE0CF");
    if(m!=null&&m>0){const by=y(m),bh=pT+iH-by;
      g+='<rect x="'+(cx-bW/2)+'" y="'+by+'" width="'+bW+'" height="'+bh+'" rx="4" fill="'+col+'"/>';
      g+='<text x="'+cx+'" y="'+(by-5)+'" text-anchor="middle" font-size="11" fill="#6B6457">'+fmt(m)+'</text>';
    }else{
      const lbl=d.st.working?(d.st.k==="next"?"·":(d.st.k==="part"?(lang==="en"?"n/d":"s/d"):"0")):(lang==="en"?"rest":"descanso");
      g+='<text x="'+cx+'" y="'+(pT+iH-6)+'" text-anchor="middle" font-size="10" fill="#B9AE9C">'+lbl+'</text>';
    }
    g+='<text x="'+cx+'" y="'+(H-17)+'" text-anchor="middle" font-size="11" font-weight="600" fill="#26231D">'+DAYS()[dow(d.date)]+'</text>';
    g+='<text x="'+cx+'" y="'+(H-4)+'" text-anchor="middle" font-size="9" fill="#6B6457">'+ddmm(d.date)+'</text>';
  });
  g+='<line x1="'+pL+'" y1="'+gY+'" x2="'+(W-pR)+'" y2="'+gY+'" stroke="#B5532B" stroke-width="1.5" stroke-dasharray="4 4" opacity=".7"/>';
  g+='<text x="'+(W-pR)+'" y="'+(gY-4)+'" text-anchor="end" font-size="9" fill="#B5532B">'+(lang==="en"?"1h goal":"meta 1 h")+'</text>';
  return'<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto" font-family="Hanken Grotesk">'+g+'</svg>';
}
function trendChart(weeks){
  const W=720,H=165,pL=10,pR=10,pT=20,pB=34,n=weeks.length;
  const iW=W-pL-pR,iH=H-pT-pB,slot=iW/n,bW=Math.min(42,slot*0.5);
  const y=v=>pT+iH-(v/5*iH);let g='<line x1="'+pL+'" y1="'+(pT+iH)+'" x2="'+(W-pR)+'" y2="'+(pT+iH)+'" stroke="#E2D8C8"/>';
  weeks.forEach((w,i)=>{
    const cx=pL+slot*i+slot/2,col=w.met>=5?"#3B7A4E":w.met>=3?"#C98A2B":"#AE382D";
    const by=y(w.met),bh=Math.max(2,pT+iH-by);
    g+='<rect x="'+(cx-bW/2)+'" y="'+by+'" width="'+bW+'" height="'+bh+'" rx="4" fill="'+col+'"/>';
    g+='<text x="'+cx+'" y="'+(by-5)+'" text-anchor="middle" font-size="11" font-weight="700" fill="#26231D">'+w.met+'/5</text>';
    g+='<text x="'+cx+'" y="'+(H-4)+'" text-anchor="middle" font-size="9" fill="#6B6457">'+ddmm(w.start)+'</text>';
  });
  return'<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto" font-family="Hanken Grotesk">'+g+'</svg>';
}

async function downloadReportPDF(){
  const btn=document.getElementById("pdfbtn");
  const prevLabel=btn?btn.innerHTML:"";
  if(btn){btn.disabled=true;btn.textContent=t("generating");}
  try{
    if(!window.jspdf||!window.jspdf.jsPDF)throw new Error("jsPDF");
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:"pt",format:"a4"});
    const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight();
    const M=40;
    const active=state.players.filter(p=>p.active);
    const off=state.reportOffset;
    const ord={atencion:0,hoy:1,aldia:2,sindatos:3};
    let list=active.map(p=>({p,w:weekData(p,off)}));
    list.sort((a,b)=>(ord[a.w.level]-ord[b.w.level])||a.p.friendly_name.localeCompare(b.p.friendly_name));
    const att=list.filter(x=>x.w.level==="atencion").length;
    const ok=list.filter(x=>x.w.level==="aldia").length;
    const range=reportWeekLabel(off);

    doc.setFillColor(181,83,43);
    doc.rect(0,0,W,86,"F");
    doc.setTextColor(255,255,255);
    doc.setFont("helvetica","bold");doc.setFontSize(20);
    doc.text("Centinela",M,36);
    doc.setFont("helvetica","normal");doc.setFontSize(11);
    doc.text(t("reportsTitle"),M,56);
    doc.setFontSize(9);
    doc.text(t("reportsSub"),M,72);
    doc.setFontSize(10);
    doc.text(t("reportRange")+": "+range,W-M,36,{align:"right"});
    doc.text(t("reportGeneratedOn")+": "+new Date().toLocaleString(lang==="en"?"en-US":"es-MX"),W-M,52,{align:"right"});

    let y=116;
    const statBoxes=[
      {label:t("reportPlayersLbl"),value:String(active.length),color:[38,35,29]},
      {label:t("reportNeedAtt"),value:String(att),color:[174,56,45]},
      {label:t("reportOnTrack"),value:String(ok),color:[59,122,78]}
    ];
    const gap=14,boxW=(W-2*M-2*gap)/3,boxH=58;
    statBoxes.forEach((s,i)=>{
      const x=M+i*(boxW+gap);
      doc.setFillColor(251,248,242);doc.setDrawColor(226,216,200);
      doc.roundedRect(x,y,boxW,boxH,6,6,"FD");
      doc.setTextColor(107,100,87);doc.setFont("helvetica","normal");doc.setFontSize(9);
      doc.text(s.label,x+14,y+22);
      doc.setTextColor(s.color[0],s.color[1],s.color[2]);doc.setFont("helvetica","bold");doc.setFontSize(22);
      doc.text(s.value,x+14,y+46);
    });
    y+=boxH+26;

    const cols=[
      {w:0.30,label:t("colPlayer")},
      {w:0.22,label:t("colCountry")},
      {w:0.20,label:t("colDays")},
      {w:0.10,label:t("colMet")},
      {w:0.18,label:t("colStatus")}
    ];
    const tableW=W-2*M;
    let cx=M;
    const colX=cols.map(c=>{const x=cx;cx+=c.w*tableW;return x;});

    function drawTableHeader(){
      doc.setFillColor(237,230,216);
      doc.rect(M,y,tableW,24,"F");
      doc.setTextColor(38,35,29);doc.setFont("helvetica","bold");doc.setFontSize(9);
      cols.forEach((c,i)=>doc.text(c.label.toUpperCase(),colX[i]+10,y+16));
      y+=24;
    }
    drawTableHeader();

    const rowH=44;
    const dayColors={ok:[59,122,78],no:[174,56,45],cur:[201,138,43],next:[217,205,186],part:[185,174,156]};
    const pillColors={
      atencion:{bg:[251,238,236],fg:[174,56,45],label:t("pillAtt")},
      hoy:{bg:[251,241,223],fg:[201,138,43],label:t("pillHoy")},
      sindatos:{bg:[237,230,216],fg:[107,100,87],label:t("pillNone")},
      aldia:{bg:[234,243,236],fg:[59,122,78],label:t("pillOk")}
    };

    list.forEach((row,idx)=>{
      if(y+rowH>H-90){
        doc.addPage();
        y=M;
        drawTableHeader();
      }
      if(idx%2===1){doc.setFillColor(251,248,242);doc.rect(M,y,tableW,rowH,"F");}
      const p=row.p,w=row.w;
      doc.setTextColor(38,35,29);doc.setFont("helvetica","bold");doc.setFontSize(11);
      doc.text(String(p.friendly_name||"—"),colX[0]+10,y+19);
      doc.setTextColor(107,100,87);doc.setFont("helvetica","normal");doc.setFontSize(9);
      doc.text(String(p.account_name||"—"),colX[0]+10,y+33);

      doc.setTextColor(38,35,29);doc.setFontSize(9);
      const tzLines=doc.splitTextToSize(tzLabel(playerTZ(p)),cols[1].w*tableW-16);
      doc.text(tzLines,colX[1]+10,y+rowH/2-(tzLines.length-1)*5+3);

      let dx=colX[2]+10;
      const dSize=14,dGap=3;
      w.days.filter(d=>d.st.working).forEach(d=>{
        const col=d.st.k==="ok"?dayColors.ok:d.st.k==="no"?dayColors.no:d.st.k==="cur"?dayColors.cur:d.st.k==="next"?dayColors.next:d.st.k==="part"?dayColors.part:[217,205,186];
        doc.setFillColor(col[0],col[1],col[2]);
        doc.roundedRect(dx,y+rowH/2-dSize/2,dSize,dSize,3,3,"F");
        doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(7);
        doc.text(DAYS()[dow(d.date)][0],dx+dSize/2,y+rowH/2+2.5,{align:"center"});
        dx+=dSize+dGap;
      });

      doc.setTextColor(38,35,29);doc.setFont("helvetica","bold");doc.setFontSize(12);
      doc.text(w.met+"/5",colX[3]+10,y+rowH/2+4);

      const pc=pillColors[w.level];
      const pillW=Math.min(cols[4].w*tableW-16,108);
      doc.setFillColor(pc.bg[0],pc.bg[1],pc.bg[2]);
      doc.roundedRect(colX[4]+8,y+rowH/2-11,pillW,22,11,11,"F");
      doc.setTextColor(pc.fg[0],pc.fg[1],pc.fg[2]);doc.setFont("helvetica","bold");doc.setFontSize(8);
      doc.text(pc.label,colX[4]+8+pillW/2,y+rowH/2+3,{align:"center"});

      y+=rowH;
      doc.setDrawColor(226,216,200);
      doc.line(M,y,M+tableW,y);
    });

    y+=22;
    if(y>H-70){doc.addPage();y=M;}
    doc.setTextColor(107,100,87);doc.setFont("helvetica","normal");doc.setFontSize(8);
    const noteLines=doc.splitTextToSize(t("reportMethodology"),tableW);
    doc.text(noteLines,M,y);
    y+=noteLines.length*10+12;
    doc.text(t("reportFooter")+" · "+new Date().toLocaleDateString(lang==="en"?"en-US":"es-MX"),M,y);

    doc.save("centinela-reporte-"+reportWeekStartISO(off)+".pdf");
  }catch(e){
    alert(t("pdfError")+e.message);
  }finally{
    if(btn){btn.disabled=false;btn.innerHTML=prevLabel;}
  }
}

function adminView(){
  const tzOpts=TZS.map(row=>'<option value="'+row[0]+'">'+(lang==="en"?row[2]:row[1])+'</option>').join("");
  const wsOpts=DAYS().map((d,i)=>'<option value="'+i+'">'+d+'</option>').join("");
  let form='<div class="card"><h3 style="margin-bottom:12px">'+t("addPlayer")+'</h3>'+
    '<div class="grid2">'+
    '<div class="field"><label>'+t("displayName")+'</label><input id="f_name" placeholder="'+t("displayNameEx")+'"></div>'+
    '<div class="field"><label>'+t("apiKey")+'</label><input id="f_key" placeholder="'+t("apiKeyEx")+'"></div></div>'+
    '<div class="grid2">'+
    '<div class="field"><label>'+t("country")+'</label><select id="f_tz">'+tzOpts+'</select></div>'+
    '<div class="field"><label>'+t("firstWorkday")+'</label><select id="f_ws">'+wsOpts+'</select></div></div>'+
    '<button id="addbtn" class="btn" onclick="addPlayer()">'+t("validateAdd")+'</button>'+
    '<div id="addmsg" class="note" style="margin-top:8px"></div>'+
    '<p class="note" style="margin-top:6px">'+t("addNote")+'</p></div>';
  if(state.addMsg)form='<div class="card"><div class="'+(state.addMsg.err?"err":"ok")+'">'+esc(state.addMsg.text)+'</div></div>'+form;

  let rows="";
  for(const p of state.players){
    const wsSel=DAYS().map((d,i)=>'<option value="'+i+'"'+(i===p.week_start_day?" selected":"")+'>'+d+'</option>').join("");
    const tz=playerTZ(p);
    if(state.editing===p.id){
      const tzEditOpts=TZS.map(row=>'<option value="'+row[0]+'"'+(row[0]===tz?" selected":"")+'>'+(lang==="en"?row[2]:row[1])+'</option>').join("");
      rows+='<tr class="edit-row"><td colspan="5" style="padding:10px 8px">'+
        '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+
        '<input id="edit_name" value="'+esc(p.friendly_name)+'" style="width:160px">'+
        '<select id="edit_tz" style="width:260px">'+tzEditOpts+'</select>'+
        '<button class="btn sm" onclick="saveEdit(\''+p.id+'\')">'+t("save")+'</button>'+
        '<button class="btn ghost sm" onclick="cancelEdit()">'+t("cancel")+'</button>'+
        '</div></td></tr>';
    }else{
      rows+='<tr class="'+(p.active?"":"off")+'">'+
        '<td><b>'+esc(p.friendly_name)+'</b><div class="c-acct">'+esc(p.account_name||"—")+'</div></td>'+
        '<td>'+esc(tzLabel(tz))+'</td>'+
        '<td><select class="wsmini" onchange="changeWs(\''+p.id+'\',this.value)">'+wsSel+'</select></td>'+
        '<td><span class="pill '+(p.active?"on":"off")+'">'+(p.active?t("active"):t("inactive"))+'</span></td>'+
        '<td style="text-align:right;white-space:nowrap">'+
        '<button class="btn ghost sm" onclick="startEdit(\''+p.id+'\')">'+t("edit")+'</button> '+
        '<button class="btn ghost sm" onclick="toggleActive(\''+p.id+'\','+p.active+')">'+(p.active?t("pause"):t("reactivate"))+'</button> '+
        '<button class="btn danger sm" onclick="delPlayer(\''+p.id+'\',\''+esc(p.friendly_name).replace(/'/g,"")+'\')">'+t("delete")+'</button></td></tr>';
    }
  }
  const table=state.players.length?
    '<div class="card"><h3 style="margin-bottom:10px">'+t("playersTable")+'</h3>'+
    '<table><thead><tr><th>'+t("colPlayer")+'</th><th>'+t("colCountry")+'</th><th>'+t("colWeekStart")+'</th><th>'+t("colStatus")+'</th><th></th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>'
    :'<div class="card"><div class="empty">'+t("noPlayersYet")+'</div></div>';
  return form+table;
}

function fmt(min){min=Math.round(min);if(min<60)return min+"m";const h=Math.floor(min/60),m=min%60;return h+"h"+(m?" "+m+"m":"");}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

sb.auth.getSession().then(function(r){state.session=r.data.session;if(state.session)loadAll();else render();});
sb.auth.onAuthStateChange(function(_e,session){const was=!!state.session;state.session=session;if(session&&!was)loadAll();else render();});
</script>
