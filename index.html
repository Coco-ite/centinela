<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Centinela</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#F3EDE2; --card:#FBF8F2; --ink:#26231D; --soft:#6B6457;
    --copper:#B5532B; --copper-d:#984321; --emerald:#3B7A4E; --brick:#AE382D;
    --amber:#C98A2B; --line:#E2D8C8; --muted:#EDE6D8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--parchment);color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:"Bricolage Grotesque",system-ui,sans-serif;margin:0}
  .wrap{max-width:1040px;margin:0 auto;padding:22px 20px 70px}
  .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .logo{width:42px;height:42px;flex:none}
  .top h1{font-size:25px;letter-spacing:-.01em}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft)}
  .userbar{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--soft)}
  .nav{display:flex;margin:18px 0 14px;border-bottom:1px solid var(--line)}
  .nav button{background:none;border:0;padding:9px 0;margin-right:22px;font:inherit;font-weight:600;color:var(--soft);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .nav button.active{color:var(--ink);border-color:var(--copper)}
  .btn{display:inline-flex;align-items:center;gap:6px;background:var(--copper);color:#fff;border:0;border-radius:9px;padding:9px 15px;font:inherit;font-weight:600;cursor:pointer}
  .btn:hover{background:var(--copper-d)} .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:transparent;color:var(--soft);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--muted);color:var(--ink)}
  .btn.sm{padding:5px 10px;font-size:13px;border-radius:7px}
  .btn.danger{background:transparent;color:var(--brick);border:1px solid #E6C4be}
  .btn.danger:hover{background:#FBEEEC}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px}
  label{display:block;font-size:12px;font-weight:600;color:var(--soft);margin:0 0 4px}
  input,select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;font:inherit;color:var(--ink)}
  input:focus,select:focus{outline:none;border-color:var(--copper)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field{margin-bottom:12px}
  .note{font-size:12px;color:var(--soft)} .err{color:var(--brick);font-size:13px;margin-top:6px} .ok{color:var(--emerald);font-size:13px;margin-top:6px}
  .spin,.empty{color:var(--soft);text-align:center;padding:34px 10px}
  .summary-h{font-size:14px;color:var(--soft);margin:2px 0 12px}
  .summary-h b{color:var(--ink)} .summary-h .bad{color:var(--brick);font-weight:700}
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .seg-ctl{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .seg-ctl button{border:0;background:transparent;padding:6px 13px;font:inherit;font-size:13px;color:var(--soft);cursor:pointer}
  .seg-ctl button.on{background:var(--muted);color:var(--ink);font-weight:600}
  .toolbar .search{flex:1;max-width:240px;margin-left:auto;padding:7px 11px;font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .card2{text-align:left;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:14px;padding:15px 17px;cursor:pointer;font:inherit;color:inherit;transition:border-color .12s, box-shadow .12s;width:100%}
  .card2:hover{border-color:var(--copper);box-shadow:0 3px 12px rgba(38,35,29,.07)}
  .card2.lv-att{border-left-color:var(--brick)} .card2.lv-hoy{border-left-color:var(--amber)}
  .card2.lv-ok{border-left-color:var(--emerald)} .card2.lv-none{border-left-color:var(--line)}
  .c-top{display:flex;align-items:flex-start;gap:8px;justify-content:space-between}
  .c-name{font-family:"Bricolage Grotesque";font-weight:700;font-size:16px}
  .c-acct{font-size:12px;color:var(--soft);margin-top:2px}
  .st{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex:none}
  .st.att{background:#FBEEEC;color:var(--brick)} .st.hoy{background:#FBF1DF;color:var(--amber)}
  .st.ok{background:#EAF3EC;color:var(--emerald)} .st.none{background:var(--muted);color:var(--soft)}
  .strip{display:flex;gap:5px;margin:13px 0 11px}
  .seg{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#fff;border:1px solid var(--line);color:var(--soft)}
  .seg.ok{background:var(--emerald);color:#fff;border-color:var(--emerald)}
  .seg.no{background:var(--brick);color:#fff;border-color:var(--brick)}
  .seg.cur{background:#FBF1DF;color:var(--amber);border-color:#EAD7AE}
  .seg.next{opacity:.45} .seg.part{color:#B9AE9C}
  .c-bot{font-size:13px;color:var(--soft)} .c-bot b{font-family:"Bricolage Grotesque";color:var(--ink);font-size:15px}
  .back{background:none;border:0;color:var(--soft);font:inherit;font-weight:600;cursor:pointer;padding:2px 0;margin-bottom:10px}
  .back:hover{color:var(--ink)}
  .dhead{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .dhead h2{font-size:22px}
  .dmeta{font-size:13px;color:var(--soft);margin-top:3px}
  .dhead .st{margin-left:auto;align-self:center}
  .weeknav{display:flex;align-items:center;gap:14px;margin:14px 0;font-size:14px;color:var(--soft)}
  .weeknav .rng{font-weight:600;color:var(--ink)}
  .ctitle{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--soft);margin-bottom:12px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .lab{font-size:12px;color:var(--soft)} .stat .val{font-family:"Bricolage Grotesque";font-weight:700;font-size:23px;margin-top:3px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);font-weight:600;padding:8px;border-bottom:1px solid var(--line)}
  td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr.off td{opacity:.5}
  .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
  .pill.on{background:#EAF3EC;color:var(--emerald)} .pill.off{background:var(--muted);color:var(--soft)}
  .wsmini{width:auto;padding:4px 8px;font-size:13px;border-radius:7px}
  .loginbox{width:100%;max-width:380px}
  @media(max-width:560px){ .grid2,.stats{grid-template-columns:1fr} }
</style>
</head>
<body>
<div id="app"><div class="spin">Cargando…</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://erlqmyoltbroexeexvic.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVybHFteW9sdGJyb2V4ZWV4dmljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4ODE1OTgsImV4cCI6MjA5NjQ1NzU5OH0.lZLAC6RQlmzdukQRltvn9K2eaxYJ-tADNIGKAy_nbAI";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const DAYS = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const TZS = [
  [-8,"UTC−8 · Los Ángeles"],[-7,"UTC−7 · Denver"],[-6,"UTC−6 · Ciudad de México"],
  [-5,"UTC−5 · Nueva York / Bogotá"],[-4,"UTC−4 · Santiago"],[-3,"UTC−3 · Buenos Aires"],
  [0,"UTC±0 · Londres"],[1,"UTC+1 · Madrid"],[2,"UTC+2 · Atenas"]
];

let state = { session:null, view:"resumen", selected:null, weekOffset:0,
              filter:"todos", search:"", players:[], schedules:[], snaps:[],
              loading:true, addMsg:null, lastSync:null };

const pad=n=>String(n).padStart(2,"0");
const localDate=(ms,off)=>{const d=new Date(ms+off*3600e3);return d.getUTCFullYear()+"-"+pad(d.getUTCMonth()+1)+"-"+pad(d.getUTCDate());};
const addDays=(s,n)=>{const d=new Date(s+"T00:00:00Z");d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10);};
const dow=s=>new Date(s+"T00:00:00Z").getUTCDay();
const ddmm=s=>{const a=s.split("-");return a[2]+"/"+a[1];};
const todayLocal=off=>localDate(Date.now(),off);
const weekStartOf=(s,ws)=>{let d=new Date(s+"T00:00:00Z");while(d.getUTCDay()!==ws)d.setUTCDate(d.getUTCDate()-1);return d.toISOString().slice(0,10);};
const isWorking=(s,ws)=>((dow(s)-ws+7)%7)<5;
function wsForPlayer(p,dateStr){
  const sc=state.schedules.filter(x=>x.player_id===p.id&&x.effective_from<=dateStr).sort((a,b)=>a.effective_from<b.effective_from?1:-1);
  return sc.length?sc[0].week_start_day:p.week_start_day;
}
function dayAges(p){
  const arr=state.snaps.filter(s=>s.player_id===p.id).map(s=>({t:Date.parse(s.captured_at),age:s.age_seconds})).sort((a,b)=>a.t-b.t);
  const byDate={}; for(const s of arr) byDate[localDate(s.t,p.tz_offset)]=s.age;
  return {byDate,dates:Object.keys(byDate).sort()};
}
function endAge(da,s){let r=null;for(const d of da.dates){if(d<=s)r=da.byDate[d];else break;}return r;}
function minutesFor(da,s){const e=endAge(da,s),pv=endAge(da,addDays(s,-1));if(e==null||pv==null)return{min:null,partial:true};return{min:Math.max(0,(e-pv)/60),partial:false};}
function statusFor(p,da,s){
  const ws=wsForPlayer(p,s),today=todayLocal(p.tz_offset),working=isWorking(s,ws);
  if(s>today) return {k:"next",label:"próximo",min:null,working};
  const r=minutesFor(da,s);
  if(!working) return {k:"rest",label:"descanso",min:r.min,working};
  if(r.partial) return {k:"part",label:"sin datos",min:null,working};
  if(r.min>=60) return {k:"ok",label:"cumplió",min:r.min,working};
  if(s===today) return {k:"cur",label:"en curso",min:r.min,working};
  return {k:"no",label:"no cumplió",min:r.min,working};
}
function weekData(p,off){
  const da=dayAges(p),today=todayLocal(p.tz_offset);
  const curStart=weekStartOf(today,wsForPlayer(p,today));
  const weekStart=addDays(curStart,off*7);
  const days=[]; for(let i=0;i<7;i++){const d=addDays(weekStart,i);days.push({date:d,st:statusFor(p,da,d)});}
  let met=0,missed=0,todayPending=false,elapsed=0;
  for(const o of days){ if(!o.st.working) continue;
    if(o.date<today){ elapsed++; if(o.st.k==="ok")met++; else if(o.st.k==="no")missed++; }
    else if(o.date===today){ if(o.st.k==="ok"){met++;elapsed++;} else if(o.st.k==="no"){missed++;elapsed++;} else todayPending=true; }
  }
  let level= missed>0?"atencion":(todayPending?"hoy":"aldia");
  if(da.dates.length===0) level="sindatos";
  return {da,weekStart,days,met,missed,todayPending,elapsed,level};
}
function weeklyTrend(p,n){const a=[];for(let o=-(n-1);o<=0;o++){const w=weekData(p,o);a.push({start:w.weekStart,met:w.met});}return a;}
function currentStreak(p){
  const da=dayAges(p),today=todayLocal(p.tz_offset); let streak=0,d=today;
  for(let i=0;i<70;i++){
    const ws=wsForPlayer(p,d);
    if(isWorking(d,ws)){
      const st=statusFor(p,da,d);
      if(st.k==="cur"||st.k==="part"){ if(d===today){d=addDays(d,-1);continue;} break; }
      if(st.k==="ok") streak++; else break;
    }
    d=addDays(d,-1);
  }
  return streak;
}
function totalHours(p){const s=state.snaps.filter(x=>x.player_id===p.id);if(!s.length)return null;return Math.max.apply(null,s.map(x=>x.age_seconds))/3600;}

async function loadAll(){
  state.loading=true; render();
  const since=new Date(Date.now()-70*864e5).toISOString();
  const r=await Promise.all([
    sb.from("players").select("*").order("friendly_name"),
    sb.from("schedules").select("*"),
    sb.from("snapshots").select("player_id,captured_at,age_seconds").gte("captured_at",since)
  ]);
  state.players=r[0].data||[]; state.schedules=r[1].data||[]; state.snaps=r[2].data||[];
  state.loading=false; state.lastSync=new Date(); render();
}

async function login(){
  const email=document.getElementById("email").value.trim(),pass=document.getElementById("pass").value;
  const box=document.getElementById("loginerr"); box.textContent="";
  const res=await sb.auth.signInWithPassword({email,password:pass});
  if(res.error) box.textContent="No se pudo entrar: revisa correo y contraseña.";
}
async function logout(){ await sb.auth.signOut(); }
async function validateKey(key){
  try{
    const r=await fetch("https://api.guildwars2.com/v2/account?access_token="+encodeURIComponent(key));
    if(r.status===200){const a=await r.json();return{ok:true,name:a.name,age:a.age};}
    if(r.status===401||r.status===403)return{ok:false,error:'La clave no es válida o le falta el permiso "account".'};
    return{ok:false,error:"No se pudo verificar la clave ahora mismo. Intenta otra vez."};
  }catch(e){return{ok:false,error:"Error de conexión al verificar la clave."};}
}
async function addPlayer(){
  const name=v("f_name").trim(),key=v("f_key").trim(),off=parseInt(v("f_tz")),ws=parseInt(v("f_ws"));
  const tzLabel=((TZS.find(t=>t[0]===off)||[off,"UTC"])[1].split(" · ")[1])||("UTC"+off);
  const btn=document.getElementById("addbtn");
  if(!name||!key){setAddMsg("Completa el nombre y la clave.",true);return;}
  btn.disabled=true; setAddMsg("Validando la clave con Guild Wars 2…",false);
  const val_=await validateKey(key);
  if(!val_.ok){setAddMsg(val_.error,true);btn.disabled=false;return;}
  const masked=key.slice(0,4)+"····"+key.slice(-4);
  const ins=await sb.from("players").insert({friendly_name:name,account_name:val_.name,tz_city:tzLabel,tz_offset:off,week_start_day:ws,active:true}).select().single();
  if(ins.error){setAddMsg("Error al guardar el jugador: "+ins.error.message,true);btn.disabled=false;return;}
  const p=ins.data;
  const k=await sb.from("player_keys").insert({player_id:p.id,api_key:key,key_masked:masked});
  if(k.error){setAddMsg("Jugador creado, pero falló guardar la clave: "+k.error.message,true);btn.disabled=false;await loadAll();return;}
  await sb.from("schedules").insert({player_id:p.id,week_start_day:ws,effective_from:todayLocal(off)});
  btn.disabled=false; state.addMsg={text:"✓ "+name+" ("+val_.name+") añadido. El grabador empezará a tomar fotos pronto.",err:false};
  await loadAll();
}
async function toggleActive(id,cur){await sb.from("players").update({active:!cur}).eq("id",id);await loadAll();}
async function delPlayer(id,name){if(!confirm("¿Eliminar a "+name+"? Se borrarán su clave y su historial. No se puede deshacer."))return;await sb.from("players").delete().eq("id",id);await loadAll();}
async function changeWs(id,ws){const p=state.players.find(x=>x.id===id);await sb.from("players").update({week_start_day:parseInt(ws)}).eq("id",id);await sb.from("schedules").insert({player_id:id,week_start_day:parseInt(ws),effective_from:todayLocal(p.tz_offset)});await loadAll();}
function v(id){return document.getElementById(id).value;}
function setAddMsg(t,err){const e=document.getElementById("addmsg");if(e){e.textContent=t;e.className=err?"err":"note";}}
function setView(x){state.view=x;state.addMsg=null;render();}
function openPlayer(id){state.selected=id;state.weekOffset=0;state.view="detalle";render();}
function back(){state.view="resumen";state.weekOffset=0;render();}
function prevWeek(){state.weekOffset--;render();}
function nextWeek(){if(state.weekOffset<0){state.weekOffset++;render();}}
function setFilter(f){state.filter=f;render();}
function setSearch(val){state.search=val;render();const el=document.getElementById("searchbox");if(el){el.focus();el.setSelectionRange(val.length,val.length);}}

function minutesChart(days){
  const W=720,H=215,padL=10,padR=10,padT=24,padB=36,n=days.length;
  const innerW=W-padL-padR,innerH=H-padT-padB,slot=innerW/n,barW=Math.min(48,slot*0.5);
  let mx=90; days.forEach(d=>{if(d.st.min&&d.st.min>mx)mx=d.st.min;}); const scaleMax=Math.ceil(mx/30)*30;
  const y=val=>padT+innerH-(val/scaleMax*innerH), goalY=y(60);
  let g=""; days.forEach((d,i)=>{
    const cx=padL+slot*i+slot/2,m=d.st.min;
    const color=d.st.k==="ok"?"#3B7A4E":d.st.k==="no"?"#AE382D":d.st.k==="cur"?"#C98A2B":(d.st.working?"#D9CDBA":"#EAE0CF");
    if(m!=null&&m>0){const by=y(m),bh=padT+innerH-by;
      g+='<rect x="'+(cx-barW/2)+'" y="'+by+'" width="'+barW+'" height="'+bh+'" rx="4" fill="'+color+'"/>';
      g+='<text x="'+cx+'" y="'+(by-5)+'" text-anchor="middle" font-size="11" fill="#6B6457" font-family="Spline Sans Mono">'+fmt(m)+'</text>';
    } else { g+='<text x="'+cx+'" y="'+(padT+innerH-6)+'" text-anchor="middle" font-size="10" fill="#B9AE9C">'+(d.st.working?(d.st.k==="next"?"·":(d.st.k==="part"?"s/d":"0")):"descanso")+'</text>'; }
    g+='<text x="'+cx+'" y="'+(H-17)+'" text-anchor="middle" font-size="11" font-weight="600" fill="#26231D">'+DAYS[dow(d.date)]+'</text>';
    g+='<text x="'+cx+'" y="'+(H-4)+'" text-anchor="middle" font-size="9" fill="#6B6457">'+ddmm(d.date)+'</text>';
  });
  g+='<line x1="'+padL+'" y1="'+goalY+'" x2="'+(W-padR)+'" y2="'+goalY+'" stroke="#B5532B" stroke-width="1.5" stroke-dasharray="4 4" opacity=".7"/>';
  g+='<text x="'+(W-padR)+'" y="'+(goalY-4)+'" text-anchor="end" font-size="9" fill="#B5532B">meta 1 h</text>';
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto" font-family="Hanken Grotesk">'+g+'</svg>';
}
function trendChart(weeks){
  const W=720,H=165,padL=10,padR=10,padT=20,padB=34,n=weeks.length;
  const innerW=W-padL-padR,innerH=H-padT-padB,slot=innerW/n,barW=Math.min(42,slot*0.5);
  const y=val=>padT+innerH-(val/5*innerH);
  let g='<line x1="'+padL+'" y1="'+(padT+innerH)+'" x2="'+(W-padR)+'" y2="'+(padT+innerH)+'" stroke="#E2D8C8"/>';
  weeks.forEach((w,i)=>{
    const cx=padL+slot*i+slot/2,color=w.met>=5?"#3B7A4E":w.met>=3?"#C98A2B":"#AE382D";
    const by=y(w.met),bh=Math.max(2,padT+innerH-by);
    g+='<rect x="'+(cx-barW/2)+'" y="'+by+'" width="'+barW+'" height="'+bh+'" rx="4" fill="'+color+'"/>';
    g+='<text x="'+cx+'" y="'+(by-5)+'" text-anchor="middle" font-size="11" font-weight="700" fill="#26231D">'+w.met+'/5</text>';
    g+='<text x="'+cx+'" y="'+(H-4)+'" text-anchor="middle" font-size="9" fill="#6B6457">'+ddmm(w.start)+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto" font-family="Hanken Grotesk">'+g+'</svg>';
}

const LOGO='<svg class="logo" viewBox="0 0 48 48" fill="none"><path d="M24 4l16 6v11c0 11-7 18-16 23-9-5-16-12-16-23V10l16-6z" fill="#B5532B"/><path d="M24 13v22M15 21l9-8 9 8" stroke="#F3EDE2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function render(){
  const app=document.getElementById("app");
  if(!state.session){app.innerHTML=loginView();return;}
  const body = state.view==="admin"?adminView() : state.view==="detalle"?detalleView() : resumenView();
  const resumenActive = state.view!=="admin";
  app.innerHTML='<div class="wrap">'+
    '<div class="top">'+LOGO+'<div><div class="eyebrow">Centinela</div><h1>Seguimiento del equipo</h1></div>'+
      '<div class="userbar"><span>'+esc(state.session.user.email)+'</span>'+
      '<button class="btn ghost sm" onclick="loadAll()">Actualizar</button>'+
      '<button class="btn ghost sm" onclick="logout()">Salir</button></div></div>'+
    '<div class="nav">'+
      '<button class="'+(resumenActive?"active":"")+'" onclick="setView(\'resumen\')">Resumen</button>'+
      '<button class="'+(state.view==="admin"?"active":"")+'" onclick="setView(\'admin\')">Administración</button>'+
    '</div>'+body+'</div>';
}

function loginView(){
  return '<div class="center"><div class="loginbox">'+
    '<div style="text-align:center;margin-bottom:18px">'+LOGO+'<div class="eyebrow" style="margin-top:8px">Centinela</div><h1 style="font-size:24px">Iniciar sesión</h1></div>'+
    '<div class="card"><div class="field"><label>Correo</label><input id="email" type="email" autocomplete="username"></div>'+
      '<div class="field"><label>Contraseña</label><input id="pass" type="password" autocomplete="current-password" onkeydown="if(event.key===\'Enter\')login()"></div>'+
      '<button class="btn" style="width:100%;justify-content:center" onclick="login()">Entrar</button><div id="loginerr" class="err"></div></div>'+
    '<p class="note" style="text-align:center">Acceso solo para administradores.</p></div></div>';
}

function pillFor(level){
  return level==="atencion"?'<span class="st att">Necesita atención</span>'
    :level==="hoy"?'<span class="st hoy">Pendiente hoy</span>'
    :level==="sindatos"?'<span class="st none">Sin datos aún</span>'
    :'<span class="st ok">Al día</span>';
}
function weekStrip(days){
  return days.filter(d=>d.st.working).map(d=>{
    const c=d.st.k==="ok"?"ok":d.st.k==="no"?"no":d.st.k==="cur"?"cur":d.st.k==="next"?"next":d.st.k==="part"?"part":"";
    return '<span class="seg '+c+'">'+DAYS[dow(d.date)][0]+'</span>';
  }).join("");
}
function resumenView(){
  if(state.loading) return '<div class="spin">Cargando datos…</div>';
  const active=state.players.filter(p=>p.active);
  if(!active.length) return '<div class="card"><div class="empty">Aún no hay jugadores. Ve a <b>Administración</b> para añadir el primero.</div></div>';
  const ord={atencion:0,hoy:1,aldia:2,sindatos:3};
  let list=active.map(p=>({p,w:weekData(p,0)}));
  list.sort((a,b)=>(ord[a.w.level]-ord[b.w.level])||a.p.friendly_name.localeCompare(b.p.friendly_name));
  const att=list.filter(x=>x.w.level==="atencion").length;
  const head='<div class="summary-h"><b>'+active.length+'</b> jugadores · <span class="'+(att?"bad":"")+'">'+att+' '+(att===1?"necesita":"necesitan")+' atención</span> · '+(active.length-att)+' al día</div>';
  let shown=list;
  if(state.filter==="riesgo") shown=list.filter(x=>x.w.level==="atencion"||x.w.level==="hoy");
  else if(state.filter==="aldia") shown=list.filter(x=>x.w.level==="aldia");
  if(state.search){const q=state.search.toLowerCase();shown=shown.filter(x=>x.p.friendly_name.toLowerCase().includes(q)||(x.p.account_name||"").toLowerCase().includes(q));}
  const tools='<div class="toolbar"><div class="seg-ctl">'+
    '<button class="'+(state.filter==="todos"?"on":"")+'" onclick="setFilter(\'todos\')">Todos</button>'+
    '<button class="'+(state.filter==="riesgo"?"on":"")+'" onclick="setFilter(\'riesgo\')">En riesgo</button>'+
    '<button class="'+(state.filter==="aldia"?"on":"")+'" onclick="setFilter(\'aldia\')">Al día</button></div>'+
    '<input id="searchbox" class="search" placeholder="Buscar jugador…" value="'+esc(state.search)+'" oninput="setSearch(this.value)"></div>';
  const cards = shown.length? '<div class="grid">'+shown.map(x=>card(x.p,x.w)).join("")+'</div>'
    : '<div class="card"><div class="empty">Ningún jugador coincide con el filtro.</div></div>';
  const sync=state.lastSync?'<p class="note" style="margin-top:12px">Actualizado '+state.lastSync.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})+'. Las fotos se toman cada ~30 min.</p>':"";
  return head+tools+cards+sync;
}
function card(p,w){
  return '<button class="card2 lv-'+(w.level==="atencion"?"att":w.level==="hoy"?"hoy":w.level==="sindatos"?"none":"ok")+'" onclick="openPlayer(\''+p.id+'\')">'+
    '<div class="c-top"><div><div class="c-name">'+esc(p.friendly_name)+'</div><div class="c-acct">'+esc(p.account_name||"—")+' · '+esc(p.tz_city||("UTC"+p.tz_offset))+'</div></div>'+pillFor(w.level)+'</div>'+
    '<div class="strip">'+weekStrip(w.days)+'</div>'+
    '<div class="c-bot"><b>'+w.met+'/5</b> días cumplidos esta semana</div></button>';
}

function detalleView(){
  const p=state.players.find(x=>x.id===state.selected);
  if(!p) return resumenView();
  const w=weekData(p,state.weekOffset);
  const ws=wsForPlayer(p,w.weekStart);
  const workLabel=DAYS[ws]+"–"+DAYS[(ws+4)%7];
  const range=ddmm(w.weekStart)+" – "+ddmm(addDays(w.weekStart,6));
  const trend=weeklyTrend(p,6), streak=currentStreak(p), th=totalHours(p);
  return '<button class="back" onclick="back()">← Volver al resumen</button>'+
    '<div class="card"><div class="dhead"><div><h2>'+esc(p.friendly_name)+'</h2>'+
      '<div class="dmeta">'+esc(p.account_name||"—")+' · '+esc(p.tz_city||("UTC"+p.tz_offset))+' · laborales '+workLabel+'</div></div>'+
      pillFor(w.level)+'</div></div>'+
    '<div class="weeknav"><button class="btn ghost sm" onclick="prevWeek()">← Anterior</button>'+
      '<span class="rng">'+range+(state.weekOffset===0?" · esta semana":"")+'</span>'+
      '<button class="btn ghost sm" onclick="nextWeek()" '+(state.weekOffset>=0?"disabled":"")+'>Siguiente →</button></div>'+
    '<div class="card"><div class="ctitle">Minutos por día</div>'+minutesChart(w.days)+
      '<p class="note">La línea cobre marca la meta de 1 hora. Los días de descanso no exigen tiempo.</p></div>'+
    '<div class="card"><div class="ctitle">Cumplimiento por semana (últimas 6)</div>'+trendChart(trend)+'</div>'+
    '<div class="stats">'+
      '<div class="stat"><div class="lab">Esta semana</div><div class="val">'+w.met+'/5</div></div>'+
      '<div class="stat"><div class="lab">Racha actual</div><div class="val">'+streak+' '+(streak===1?"día":"días")+'</div></div>'+
      '<div class="stat"><div class="lab">Tiempo total en GW2</div><div class="val">'+(th!=null?(Math.round(th*10)/10)+" h":"—")+'</div></div>'+
    '</div>';
}

function adminView(){
  const tzOpts=TZS.map(t=>'<option value="'+t[0]+'">'+t[1]+'</option>').join("");
  const wsOpts=DAYS.map((d,i)=>'<option value="'+i+'">'+d+'</option>').join("");
  let form='<div class="card"><h3 style="margin-bottom:12px">Añadir jugador</h3><div class="grid2">'+
    '<div class="field"><label>Nombre para mostrar</label><input id="f_name" placeholder="Ej. Aria"></div>'+
    '<div class="field"><label>Clave API de GW2</label><input id="f_key" placeholder="Pega aquí la clave"></div></div>'+
    '<div class="grid2"><div class="field"><label>Zona horaria</label><select id="f_tz">'+tzOpts+'</select></div>'+
    '<div class="field"><label>Primer día laboral</label><select id="f_ws">'+wsOpts+'</select></div></div>'+
    '<button id="addbtn" class="btn" onclick="addPlayer()">Validar y añadir</button>'+
    '<div id="addmsg" class="note" style="margin-top:8px"></div>'+
    '<p class="note" style="margin-top:6px">La clave se valida con Guild Wars 2 y se guarda escondida: nadie puede volver a leerla desde aquí.</p></div>';
  if(state.addMsg) form='<div class="card"><div class="'+(state.addMsg.err?"err":"ok")+'">'+esc(state.addMsg.text)+'</div></div>'+form;
  let rows="";
  for(const p of state.players){
    const wsSel=DAYS.map((d,i)=>'<option value="'+i+'"'+(i===p.week_start_day?" selected":"")+'>'+d+'</option>').join("");
    rows+='<tr class="'+(p.active?"":"off")+'"><td><b>'+esc(p.friendly_name)+'</b><div class="c-acct">'+esc(p.account_name||"—")+'</div></td>'+
      '<td>'+esc(p.tz_city||("UTC"+p.tz_offset))+'</td>'+
      '<td><select class="wsmini" onchange="changeWs(\''+p.id+'\',this.value)">'+wsSel+'</select></td>'+
      '<td><span class="pill '+(p.active?"on":"off")+'">'+(p.active?"activo":"inactivo")+'</span></td>'+
      '<td style="text-align:right;white-space:nowrap"><button class="btn ghost sm" onclick="toggleActive(\''+p.id+'\','+p.active+')">'+(p.active?"Pausar":"Reactivar")+'</button> '+
      '<button class="btn danger sm" onclick="delPlayer(\''+p.id+'\',\''+esc(p.friendly_name).replace(/'/g,"")+'\')">Eliminar</button></td></tr>';
  }
  const table=state.players.length?'<div class="card"><h3 style="margin-bottom:10px">Jugadores</h3><table><thead><tr><th>Jugador</th><th>Zona</th><th>Inicio semana</th><th>Estado</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>':'<div class="card"><div class="empty">Todavía no hay jugadores registrados.</div></div>';
  return form+table;
}

function fmt(min){min=Math.round(min);if(min<60)return min+"m";const h=Math.floor(min/60),m=min%60;return h+"h"+(m?" "+m+"m":"");}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

sb.auth.getSession().then(function(r){state.session=r.data.session;if(state.session)loadAll();else render();});
sb.auth.onAuthStateChange(function(_e,session){const was=!!state.session;state.session=session;if(session&&!was)loadAll();else render();});
</script>
</body>
</html>
